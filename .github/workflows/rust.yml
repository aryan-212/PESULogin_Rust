name: Rust Release

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies for cross-compilation (Linux → Windows)
      if: runner.os == 'Linux'
      run: |
        sudo apt update
        sudo apt install -y mingw-w64
        rustup target add x86_64-pc-windows-gnu
        rustup target add x86_64-unknown-linux-gnu

    - name: Set Windows target for native Windows build
      if: runner.os == 'Windows'
      run: rustup target add x86_64-pc-windows-msvc

    - name: Build project
      run: |
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          cargo build --release --target x86_64-pc-windows-msvc
        elif [[ "$RUNNER_OS" == "Linux" ]]; then
          cargo build --release --target x86_64-unknown-linux-gnu
          cargo build --release --target x86_64-pc-windows-gnu
        fi
      shell: bash

    - name: Run tests
      run: |
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          cargo test --release --target x86_64-pc-windows-msvc
        elif [[ "$RUNNER_OS" == "Linux" ]]; then
          cargo test --release --target x86_64-unknown-linux-gnu
        fi
      shell: bash

    - name: Prepare artifacts
      shell: bash
      run: |
        if [[ "$RUNNER_OS" == "Windows" ]]; then
          mv target/x86_64-pc-windows-msvc/release/my_project.exe my_project-windows.exe
        elif [[ "$RUNNER_OS" == "Linux" ]]; then
          mv target/x86_64-unknown-linux-gnu/release/my_project my_project-linux
          mv target/x86_64-pc-windows-gnu/release/my_project.exe my_project-windows-cross.exe
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-artifact
        path: |
          my_project-linux
          my_project-windows.exe
          my_project-windows-cross.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: List downloaded artifacts
      run: ls -R artifacts

    - name: Move artifacts to correct filenames
      run: |
        mv artifacts/ubuntu-latest-artifact/my_project-linux my_project-linux
        mv artifacts/windows-latest-artifact/my_project-windows.exe my_project-windows.exe
        mv artifacts/ubuntu-latest-artifact/my_project-windows-cross.exe my_project-windows-cross.exe

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          my_project-linux
          my_project-windows.exe
          my_project-windows-cross.exe
        tag_name: v1.0.${{ github.run_number }}
        release_name: Release v1.0.${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
